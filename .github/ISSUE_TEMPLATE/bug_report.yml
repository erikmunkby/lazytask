name: Bug Report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. Include steps to reproduce if possible.
      placeholder: I ran `lt list` and got...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, lazytask version (`lt --version`).
      placeholder: |
        OS: macOS 15.2 (arm64)
        lazytask: 0.1.0
    validations:
      required: true
