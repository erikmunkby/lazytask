name: 🚀 Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: 📋 Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: 🏷️ Release Please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_LAZYTASK }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  build-artifacts:
    name: 📦 Build ${{ matrix.target }}
    needs: [build-release]
    if: needs.build-release.outputs.release_created == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            ext: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            ext: zip
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.1
          targets: ${{ matrix.target }}

      - name: 🗂️ Cache Rust artifacts
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          key: ${{ matrix.target }}

      - name: 🔨 Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: 🧪 Smoke test
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            ./target/${{ matrix.target }}/release/lt.exe --version
          else
            ./target/${{ matrix.target }}/release/lt --version
          fi

      - name: 📦 Package artifact (unix)
        id: package-unix
        if: matrix.ext == 'tar.gz'
        run: |
          ASSET="lt-${{ matrix.target }}-${{ needs.build-release.outputs.tag_name }}.tar.gz"
          tar -czf "${ASSET}" -C target/${{ matrix.target }}/release lt
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"

      - name: 📦 Package artifact (windows)
        id: package-windows
        if: matrix.ext == 'zip'
        shell: bash
        run: |
          ASSET="lt-${{ matrix.target }}-${{ needs.build-release.outputs.tag_name }}.zip"
          7z a "${ASSET}" ./target/${{ matrix.target }}/release/lt.exe
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"

      - name: ⬆️ Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: ${{ steps.package-unix.outputs.asset || steps.package-windows.outputs.asset }}
          if-no-files-found: error
          retention-days: 1

  publish-release:
    name: 🚢 Publish release
    needs: [build-release, build-artifacts]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: 🔐 Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} . \;
          find . -type d -empty -delete
          sha256sum *.tar.gz *.zip > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: 🔏 Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2
        with:
          subject-path: "artifacts/*"

      - name: ⬆️ Upload assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build-release.outputs.tag_name }}
        run: |
          cd artifacts
          for f in *.tar.gz *.zip SHA256SUMS; do
            echo "Uploading ${f}"
            gh release upload "${TAG}" "${f}" --repo "${{ github.repository }}"
          done

  publish-homebrew:
    name: 🍺 Update Homebrew formula
    needs: [build-release, publish-release]
    if: needs.build-release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 Download SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build-release.outputs.tag_name }}
        run: |
          gh release download "${TAG}" --pattern 'SHA256SUMS' --repo "${{ github.repository }}"
          cat SHA256SUMS

      - name: 🔄 Clone homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/erikmunkby/homebrew-tap.git"

      - name: 📝 Update formula
        env:
          TAG: ${{ needs.build-release.outputs.tag_name }}
        run: |
          VERSION="${TAG#lazytask-v}"
          FORMULA="homebrew-tap/Formula/lazytask.rb"

          SHA_AARCH64_MACOS=$(grep "lt-aarch64-apple-darwin" SHA256SUMS | awk '{print $1}')
          SHA_X86_64_MACOS=$(grep "lt-x86_64-apple-darwin" SHA256SUMS | awk '{print $1}')
          SHA_X86_64_LINUX=$(grep "lt-x86_64-unknown-linux-gnu" SHA256SUMS | awk '{print $1}')

          echo "Updating formula to v${VERSION}"
          echo "  aarch64-macos: ${SHA_AARCH64_MACOS}"
          echo "  x86_64-macos:  ${SHA_X86_64_MACOS}"
          echo "  x86_64-linux:  ${SHA_X86_64_LINUX}"

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "${FORMULA}"

          # Update SHA256 hashes by order of appearance:
          # 1st = aarch64-apple-darwin, 2nd = x86_64-apple-darwin, 3rd = x86_64-linux
          # Note: sequential sed "0,/pattern/" won't work because each run
          # re-matches the already-replaced first line.
          awk -v s1="${SHA_AARCH64_MACOS}" -v s2="${SHA_X86_64_MACOS}" -v s3="${SHA_X86_64_LINUX}" '
            /sha256 "[a-f0-9]{64}"/ {
              n++
              if      (n==1) sub(/sha256 "[a-f0-9]+"/, "sha256 \"" s1 "\"")
              else if (n==2) sub(/sha256 "[a-f0-9]+"/, "sha256 \"" s2 "\"")
              else if (n==3) sub(/sha256 "[a-f0-9]+"/, "sha256 \"" s3 "\"")
            }
            { print }
          ' "${FORMULA}" > "${FORMULA}.tmp" && mv "${FORMULA}.tmp" "${FORMULA}"

          echo "--- Updated formula ---"
          cat "${FORMULA}"

      - name: 🚀 Push updated formula
        env:
          TAG: ${{ needs.build-release.outputs.tag_name }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${TAG#lazytask-v}"
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/lazytask.rb
          git commit -m "lazytask ${VERSION}"
          git push

  publish-crate:
    name: 📦 Publish to crates.io
    needs: [build-release, publish-release]
    if: needs.build-release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.1

      - name: 🔑 Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: 📦 Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
