name: 🚀 Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: 📋 Build release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: 🏷️ Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_LAZYTASK }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  upload-artifacts:
    name: 📦 Upload artifacts
    runs-on: ubuntu-latest
    needs: [build-release]
    if: needs.build-release.outputs.release_created == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: 🗂️ Cache Rust artifacts
        uses: swatinem/rust-cache@v2

      - name: 🔨 Build release binary
        run: cargo build --release --locked

      - name: 📦 Package binary artifact
        run: |
          mkdir -p dist
          BIN_NAME="lt"
          ARCH="$(uname -m)"
          ASSET_NAME="${BIN_NAME}-${{ runner.os }}-${ARCH}-${{ needs.build-release.outputs.tag_name }}.tar.gz"
          tar -czf "dist/${ASSET_NAME}" -C target/release "${BIN_NAME}"

      - name: ⬆️ Upload artifacts to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in dist/*; do
            echo "Uploading $f"
            gh release upload "${{ needs.build-release.outputs.tag_name }}" "$f"
          done
