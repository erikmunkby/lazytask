name: 🚀 Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: 📋 Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: 🏷️ Release Please
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_LAZYTASK }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  build-artifacts:
    name: 📦 Build ${{ matrix.target }}
    needs: [build-release]
    if: needs.build-release.outputs.release_created == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            ext: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            ext: zip
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.1
          targets: ${{ matrix.target }}

      - name: 🗂️ Cache Rust artifacts
        uses: swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          key: ${{ matrix.target }}

      - name: 🔨 Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: 🧪 Smoke test
        if: matrix.target != 'x86_64-apple-darwin'
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            ./target/${{ matrix.target }}/release/lt.exe --version
          else
            ./target/${{ matrix.target }}/release/lt --version
          fi

      - name: 📦 Package artifact (unix)
        id: package-unix
        if: matrix.ext == 'tar.gz'
        run: |
          ASSET="lt-${{ matrix.target }}-${{ needs.build-release.outputs.tag_name }}.tar.gz"
          tar -czf "${ASSET}" -C target/${{ matrix.target }}/release lt
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"

      - name: 📦 Package artifact (windows)
        id: package-windows
        if: matrix.ext == 'zip'
        shell: bash
        run: |
          ASSET="lt-${{ matrix.target }}-${{ needs.build-release.outputs.tag_name }}.zip"
          7z a "${ASSET}" ./target/${{ matrix.target }}/release/lt.exe
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"

      - name: ⬆️ Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.target }}
          path: ${{ steps.package-unix.outputs.asset || steps.package-windows.outputs.asset }}
          if-no-files-found: error
          retention-days: 1

  publish-release:
    name: 🚢 Publish release
    needs: [build-release, build-artifacts]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifacts

      - name: 🔐 Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} . \;
          find . -type d -empty -delete
          sha256sum *.tar.gz *.zip > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: 🔏 Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2
        with:
          subject-path: "artifacts/*"

      - name: ⬆️ Upload assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.build-release.outputs.tag_name }}
        run: |
          cd artifacts
          for f in *.tar.gz *.zip SHA256SUMS; do
            echo "Uploading ${f}"
            gh release upload "${TAG}" "${f}" --repo "${{ github.repository }}"
          done
